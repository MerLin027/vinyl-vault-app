<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Jost:ital,wght@0,300;1,300&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111111;
    width: 1200px;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 40px;
    gap: 32px;
  }
  svg { flex-shrink: 0; }
  .text { display: flex; flex-direction: column; gap: 8px; }
  h1 {
    font-family: 'Tenor Sans', serif;
    font-size: 52px;
    color: #4DB8B8;
    letter-spacing: 6px;
    font-weight: 400;
  }
  p {
    font-family: 'Jost', sans-serif;
    font-size: 18px;
    color: #B8A898;
    font-style: italic;
    font-weight: 300;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="48" fill="#1A1A1A" stroke="#2A2A2A" stroke-width="1.5"/>
    <circle cx="50" cy="50" r="44" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="50" cy="50" r="40" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="50" cy="50" r="36" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="50" cy="50" r="32" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="50" cy="50" r="28" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="50" cy="50" r="24" fill="none" stroke="#2A2A2A" stroke-width="0.6"/>
    <circle cx="50" cy="50" r="18" fill="#4DB8B8"/>
    <circle cx="50" cy="50" r="4" fill="#111111"/>
  </svg>
  <div class="text">
    <h1>VINYLVAULT</h1>
    <p>Your curated record collection</p>
  </div>
</body>
</html>
