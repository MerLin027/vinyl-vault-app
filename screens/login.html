<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#5BAD8F",
                        "background-light": "#f6f7f7",
                        "background-dark": "#111211",
                        "vault-dark": "#111211",
                        "vault-card": "#1A1C19",
                        "vault-input": "#222420",
                        "vault-text": "#F5F0E8"
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }</script>
<title>VinylVault - Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-vault-dark font-display text-vault-text min-h-screen flex items-center justify-center p-4 bg-[#111211]">
<div class="w-full max-w-md flex flex-col items-center">
<!-- Logo and Wordmark -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center mb-2 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined text-vault-dark text-4xl">album</span>
</div>
<h2 class="text-2xl font-extrabold tracking-tight text-vault-text">VinylVault</h2>
</div>
<!-- Main Login Card -->
<div class="w-full space-y-6">
<h1 class="text-3xl font-bold text-center mb-8">Welcome Back</h1>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-vault-text/80 ml-1">Email</label>
<input class="w-full h-14 px-4 rounded-xl border-none bg-vault-input text-vault-text placeholder:text-vault-text/40 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="Enter your email" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-vault-text/80 ml-1">Password</label>
<div class="relative group">
<input class="w-full h-14 px-4 pr-12 rounded-xl border-none bg-vault-input text-vault-text placeholder:text-vault-text/40 focus:ring-2 focus:ring-primary focus:outline-none transition-all" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-vault-text/40 hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="flex justify-end mt-1">
<a class="text-sm text-primary hover:underline font-medium" href="#">Forgot Password?</a>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-vault-dark font-bold rounded-xl transition-all shadow-lg shadow-primary/10 flex items-center justify-center gap-2">
                Log In
            </button>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-vault-text/10"></div>
<span class="flex-shrink mx-4 text-vault-text/40 text-sm uppercase tracking-widest font-semibold">or</span>
<div class="flex-grow border-t border-vault-text/10"></div>
</div>
<!-- Google Button -->
<button class="w-full h-14 border-2 border-primary bg-transparent hover:bg-primary/5 text-primary font-semibold rounded-xl transition-all flex items-center justify-center gap-3">
<svg class="w-5 h-5 text-primary" viewbox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path></svg>
                Sign in with Google
            </button>
</div>
<!-- Bottom Link -->
<p class="mt-10 text-vault-text/60 text-center">
            Don't have an account? 
            <a class="text-primary font-bold hover:underline ml-1" href="#">Sign Up</a>
</p>
<!-- Decorative elements to match Vinyl theme -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed -top-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
</div>
</body></html>
